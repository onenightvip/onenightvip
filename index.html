<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ONENIGHTVIP | Exclusive VIP Club</title>
    <meta name="description" content="ONENIGHTVIP คลับระดับ VIP บริการประทับใจ การันตีโปรไฟล์ตรงปก">
    
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-rosegold: linear-gradient(to right, #b56c5e, #e29f8c, #b56c5e);
            --bg-glass: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* เรียกใช้รูปหินอ่อนที่คุณอัปโหลดไว้ */
            background-image: url('bg-marble.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #fdf5f5; /* สีสำรองกรณีรูปยังไม่โหลด */
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
        }

        /* =========================================
           Header & Logo (โลโก้ ONENIGHTVIP)
           ========================================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            text-align: center;
        }

        .logo-text {
            font-family: 'Italiana', serif; /* ฟอนต์หรูหรา */
            font-size: 2.8rem;
            letter-spacing: 4px;
            /* เทคนิคทำสีตัวอักษรเป็นสีโรสโกลด์แวววาว */
            background: var(--text-rosegold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* =========================================
           3D Pill Button (ปุ่มนูน 3 มิติสีชมพู)
           ========================================= */
        .btn-3d {
            display: inline-block;
            text-decoration: none;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            color: #b56c5e;
            padding: 12px 35px;
            border-radius: 50px;
            background: linear-gradient(145deg, #ffede6, #ffd1c4);
            /* สร้างมิติแสงเงาให้ปุ่มนูนและเงางามแบบในรูป */
            box-shadow: 
                6px 6px 15px rgba(220, 180, 170, 0.6), 
                -6px -6px 15px rgba(255, 255, 255, 1),
                inset 0px 5px 8px rgba(255, 255, 255, 0.8),
                inset 0px -3px 5px rgba(200, 150, 140, 0.2);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 
                8px 8px 20px rgba(220, 180, 170, 0.7), 
                -8px -8px 20px rgba(255, 255, 255, 1),
                inset 0px 5px 8px rgba(255, 255, 255, 0.9);
        }

        .btn-3d:active {
            transform: translateY(2px);
            /* พอกดปุ่ม เงาจะยุบลงไป */
            box-shadow: 
                inset 6px 6px 15px rgba(220, 180, 170, 0.6), 
                inset -6px -6px 15px rgba(255, 255, 255, 1);
        }

        /* =========================================
           Grid Layout (กระดานโปรไฟล์ รองรับมือถือ/PC)
           ========================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 8px 8px 20px rgba(200, 180, 180, 0.2), -8px -8px 20px rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image-box {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            overflow: hidden;
            background-color: #f5e6e6; 
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 15px 5px 5px 5px;
            text-align: center;
        }

        .card-name {
            font-size: 1.3rem;
            font-weight: 500;
            color: #b56c5e;
            margin-bottom: 15px;
            display: block;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .logo-text {
                font-size: 2.2rem;
            }
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
                padding: 20px 3%;
            }
            .card-image-box {
                height: 200px;
            }
            .btn-3d {
                padding: 10px 25px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <div class="logo-text">ONENIGHTVIP</div>
        </div>
        <div class="nav-buttons">
            <a href="#register" class="btn-3d">สมัครสมาชิก</a>
            <a href="#login" class="btn-3d" style="margin-left: 10px;">เข้าสู่ระบบ</a>
        </div>
    </nav>

    <main class="grid-container">
        
        <div class="card">
            <div class="card-image-box">
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=500&q=80" alt="น้อง A">
            </div>
            <div class="card-info">
                <span class="card-name">น้อง A (22)</span>
                <a href="#profile" class="btn-3d" style="width: 100%;">ดูโปรไฟล์</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image-box">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=500&q=80" alt="น้อง B">
            </div>
            <div class="card-info">
                <span class="card-name">น้อง B (24)</span>
                <a href="#profile" class="btn-3d" style="width: 100%;">ดูโปรไฟล์</a>
            </div>
        </div>

    </main>

</body>
</html>
