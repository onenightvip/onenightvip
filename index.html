<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONENIGHTVIP | Exclusive VIP Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container" onclick="switchMainView('homeView', document.getElementById('navHome'))">
            <img src="https://img2.pic.in.th/-190481cb09d161ee46.png" class="logo-img">
        </div>
        <div class="nav-actions" id="guestMenu">
            <button class="btn-outline" onclick="openAuthModal('login')">เข้าสู่ระบบ</button>
            <button class="btn-glow" onclick="openAuthModal('register')">สมัครสมาชิก</button>
        </div>
        <div class="nav-actions" id="loggedInMenu" style="display: none;">
            <div class="nav-user-chip" onclick="openDashboardRouter()">
                <div class="nav-avatar" id="navAvatar"><span id="navAvatarText">U</span></div>
                <span class="nav-user-name" id="navUserName">Username</span>
            </div>
            <button class="btn-logout" onclick="handleLogout()"><span class="iconify" data-icon="heroicons:arrow-right-on-rectangle"></span></button>
        </div>
    </nav>

    <div class="dashboard-overlay" id="agencyDashboard">
        <div class="dash-sidebar">
            <div class="dash-nav">
                <div class="dash-nav-item active" onclick="switchAgTab('ag-overview', this, 'agencyDashboard')">ภาพรวม</div>
                <div class="dash-nav-item" onclick="switchAgTab('ag-profiles', this, 'agencyDashboard')">โปรไฟล์ของฉัน</div>
                <div class="dash-nav-item" onclick="switchAgTab('ag-wallet', this, 'agencyDashboard')">กระเป๋าเงิน</div>
                <div class="dash-nav-item" onclick="switchAgTab('ag-referral', this, 'agencyDashboard')">แนะนำเพื่อน</div>
            </div>
        </div>
        <div class="dash-main">
            <div class="dash-topbar" style="background:#0a0a0a; border-bottom:1px solid #222; padding:15px 30px; display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:35px; height:35px; border-radius:50%; background:var(--dash-gold); color:#000; display:flex; justify-content:center; align-items:center; font-weight:bold;">
                        <span id="agTopbarAvatarText">U</span>
                    </div>
                    <span id="agTopbarName" style="color:#fff;">My Agency</span>
                </div>
                <button onclick="closeDashboard()" style="background:transparent; border:none; color:#888; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div class="ag-content-pad ag-view active" id="ag-overview">...</div>
            <div class="ag-content-pad ag-view" id="ag-profiles">...</div>
            <div class="ag-content-pad ag-view" id="ag-wallet">...</div>
            <div class="ag-content-pad ag-view" id="ag-referral">...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
