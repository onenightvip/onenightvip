<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OM-SOD STUDIO | Sideline VIP in Thailand</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #fdf5f5; /* สีพื้นหลังชมพูอ่อน */
            color: #b87a7a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://www.transparenttextures.com/patterns/marble.png'); /* ลายหินอ่อนบางๆ */
        }
        .header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-family: serif;
            font-size: 3.5rem;
            color: #bd736d;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.5rem;
            color: #c78984;
        }
        .btn-booking {
            background: linear-gradient(145deg, #ffd7d7, #ffb5b5);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 5px 5px 15px #e6d5d5, -5px -5px 15px #ffffff;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 50px;
        }
        .btn-booking:hover {
            transform: translateY(-2px);
            box-shadow: 7px 7px 20px #e6d5d5, -7px -7px 20px #ffffff;
        }
        .cards-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            padding: 20px;
        }
        .card {
            background: #fffafa;
            width: 280px;
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 10px 10px 20px #eadede, -10px -10px 20px #ffffff;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .card h3 {
            font-size: 1.4rem;
            color: #d18b85;
            margin-bottom: 5px;
        }
        .card p {
            font-size: 1rem;
            color: #d9a09b;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>OM-SOD STUDIO</h1>
        <p>Sideline Vip in Thailand</p>
    </div>

    <a href="#" class="btn-booking">จองคิว 👆</a>

    <div class="cards-container">
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 10px;">📋</div>
            <h3>Our Services</h3>
            <p>บริการของเรา</p>
        </div>
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 10px;">⭐</div>
            <h3>Reviews</h3>
            <p>รีวิวจากลูกค้าจริง</p>
        </div>
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 10px;">📍</div>
            <h3>Location</h3>
            <p>พิกัดน้องๆ</p>
        </div>
    </div>

</body>
</html>
