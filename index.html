<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ONENIGHTVIP | Exclusive VIP Club</title>
    <meta name="description" content="ONENIGHTVIP คลับระดับ VIP บริการประทับใจ">
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.5);
            --text-dark: #8c5a5a;
            --text-muted: #b87a7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* ดึงรูปพื้นหลังหินอ่อนมาใช้ */
            background-image: url('bg-marble.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #fdf5f5; 
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
        }

        /* =========================================
           Navbar & รูปภาพโลโก้
           ========================================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img {
            height: 55px; /* ขนาดความสูงโลโก้บนคอม */
            width: auto;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px rgba(181, 108, 94, 0.2)); /* เพิ่มเงาให้โลโก้ดูมีมิติ */
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.02);
        }

        /* ปุ่ม 3D สไตล์ที่คุณชอบ */
        .btn-3d {
            display: inline-block;
            text-decoration: none;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            color: #b56c5e;
            padding: 10px 30px;
            border-radius: 50px;
            background: linear-gradient(145deg, #ffede6, #ffd1c4);
            box-shadow: 6px 6px 15px rgba(220, 180, 170, 0.6), -6px -6px 15px rgba(255, 255, 255, 1), inset 0px 5px 8px rgba(255, 255, 255, 0.8), inset 0px -3px 5px rgba(200, 150, 140, 0.2);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .btn-3d:hover {
            transform: translateY(-2px);
            box-shadow: 8px 8px 20px rgba(220, 180, 170, 0.7), -8px -8px 20px rgba(255, 255, 255, 1), inset 0px 5px 8px rgba(255, 255, 255, 0.9);
        }

        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: inset 6px 6px 15px rgba(220, 180, 170, 0.6), inset -6px -6px 15px rgba(255, 255, 255, 1);
        }

        /* =========================================
           Grid Layout & Card Design 
           ========================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 8px 8px 20px rgba(200, 180, 180, 0.2), -8px -8px 20px rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image-box {
            position: relative; 
            width: 100%;
            height: 380px; 
            border-radius: 12px;
            overflow: hidden;
            background-color: #f5e6e6; 
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-image {
            position: absolute;
            top: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .badge-new { left: 12px; background: linear-gradient(145deg, #ff8da1, #ff5e7e); }
        .badge-hot { right: 12px; background: linear-gradient(145deg, #ffd15c, #fcae1e); }

        .heart-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .heart-btn:hover { background: rgba(0, 0, 0, 0.6); transform: scale(1.05); }
        .heart-btn:active { transform: scale(0.95); }

        .card-info { text-align: left; }
        .name-group { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .card-name { font-size: 1.2rem; font-weight: 600; color: var(--text-dark); }
        .card-age { font-size: 1.1rem; color: var(--text-muted); font-weight: normal; }
        
        .card-location {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 8px;
        }

        .card-stats-text {
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(181, 108, 94, 0.3);
            padding-top: 12px;
        }

        .price { font-size: 1.25rem; font-weight: bold; color: #b56c5e; }
        .engagement { font-size: 0.9rem; display: flex; align-items: center; gap: 12px; color: var(--text-dark); }
        .engage-item { display: flex; align-items: center; gap: 4px; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; }
            .logo-img { height: 40px; } /* ปรับขนาดโลโก้ให้พอดีมือถือ */
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 3%; }
            .card-image-box { height: 220px; }
            .card-name { font-size: 1.05rem; }
            .card-age { font-size: 0.95rem; }
            .price { font-size: 1.1rem; }
            .engagement { font-size: 0.8rem; gap: 8px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="ONE NIGHT VIP" class="logo-img">
        </div>
        <div class="nav-buttons">
            <a href="#register" class="btn-3d">สมัครสมาชิก</a>
            <a href="#login" class="btn-3d" style="margin-left: 10px;">เข้าสู่ระบบ</a>
        </div>
    </nav>

    <main class="grid-container">
        
        <div class="card">
            <div class="card-image-box">
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=500&q=80" alt="น้อง B">
                <span class="badge-image badge-new">New</span>
                <button class="heart-btn" onclick="toggleHeart(this)">
                    <span class="iconify heart-icon" data-icon="mdi:cards-heart-outline" style="color: white; font-size: 1.5rem;"></span>
                </button>
            </div>
            
            <div class="card-info">
                <div class="name-group">
                    <span class="iconify" data-icon="heroicons:check-badge-solid" style="color: #10b981; font-size: 1.3rem;"></span>
                    <span class="card-name">น้อง B <span class="card-age">(24)</span></span>
                </div>
                <div class="card-location">
                    <span class="iconify" data-icon="mdi:map-marker" style="color: #b56c5e; font-size: 1rem;"></span>
                    กรุงเทพฯ, ลาดพร้าว
                </div>
                <div class="card-stats-text">
                    34-24-36 • 157/49
                </div>
                <div class="card-footer">
                    <div class="price">฿1,000</div>
                    <div class="engagement">
                        <span class="engage-item"><span class="iconify" data-icon="heroicons:eye" style="font-size: 1.1rem;"></span> 156</span>
                        <span class="engage-item"><span class="iconify" data-icon="heroicons:star-solid" style="color: #fbbf24; font-size: 1.1rem;"></span> 4.8 (18)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-image-box">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=500&q=80" alt="น้ำหวาน">
                <span class="badge-image badge-hot">มาแรง</span>
                <button class="heart-btn" onclick="toggleHeart(this)">
                    <span class="iconify heart-icon" data-icon="mdi:cards-heart-outline" style="color: white; font-size: 1.5rem;"></span>
                </button>
            </div>
            
            <div class="card-info">
                <div class="name-group">
                    <span class="iconify" data-icon="heroicons:check-badge-solid" style="color: #10b981; font-size: 1.3rem;"></span>
                    <span class="card-name">น้ำหวาน <span class="card-age">(22)</span></span>
                </div>
                <div class="card-location">
                    <span class="iconify" data-icon="mdi:map-marker" style="color: #b56c5e; font-size: 1rem;"></span>
                    กรุงเทพฯ, บึงกุ่ม
                </div>
                <div class="card-stats-text">
                    34B-25-35 • 160/45
                </div>
                <div class="card-footer">
                    <div class="price">฿1,200</div>
                    <div class="engagement">
                        <span class="engage-item"><span class="iconify" data-icon="heroicons:eye" style="font-size: 1.1rem;"></span> 342</span>
                        <span class="engage-item"><span class="iconify" data-icon="heroicons:star-solid" style="color: #fbbf24; font-size: 1.1rem;"></span> 5.0 (42)</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function toggleHeart(button) {
            let icon = button.querySelector('.heart-icon');
            if (icon.getAttribute('data-icon') === 'mdi:cards-heart-outline') {
                icon.setAttribute('data-icon', 'mdi:cards-heart');
                icon.style.color = '#ff4d4f'; 
            } else {
                icon.setAttribute('data-icon', 'mdi:cards-heart-outline');
                icon.style.color = 'white'; 
            }
        }
    </script>
</body>
</html>
